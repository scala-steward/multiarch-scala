# Scala 3 versions are managed BY HAND. The published library modules (core, panama-api, panama-jdk,
# resources) target the 3.3 LTS line (3.3.8), but the build ALSO uses Scala 3.8.4 for the sbt-2.0
# plugin axis. Scala Steward does not respect updates.pin for Scala versions — it "unifies" the LTS
# (3.3.8) up to the Next version (3.8.4) that's already in the build (as it did for hearth). So we
# ignore the Scala 3 libs entirely and bump 3.3.x by hand.
updates.ignore = [
  { groupId="org.scala-lang", artifactId="scala3-library" },
  { groupId="org.scala-lang", artifactId="scala3-library_sjs1" },
  { groupId="org.scala-lang", artifactId="scala3-library_native0.5" }
]
updates.pin = [
  # Stay on sbt 1.x: the build cross-publishes the plugin for sbt 1.x AND sbt 2.0, driven by an
  # sbt 1.x meta-build; bumping build.properties to sbt 2.0 would break the cross-build.
  { groupId="org.scala-sbt", artifactId="sbt", version="1." }
]
pullRequests.grouping = [
  { name="scala-versions", "title"="Scala compiler updates", "filter"=[{"group" = "org.scala-lang"}, {"group" = "org.scoverage"}] }
]
