# Stay on the Scala 3 LTS line (3.3.x): allow patch bumps like 3.3.8 -> 3.3.9,
# but NOT Scala 3 Next releases (3.4.x / 3.8.x / 3.9.x).
# The published library modules (core, panama-api, panama-jdk, resources) target 3.3 LTS;
# the plugin's 3.8.4 axis is dictated by sbt 2.0 and is also frozen by this pin.
# Pattern from scalalandio/chimney.
updates.pin = [
  { groupId="org.scala-lang", artifactId="scala3-library", version="3.3." },
  { groupId="org.scala-lang", artifactId="scala3-library_sjs1", version="3.3." }
]
pullRequests.grouping = [
  { name="scala-versions", "title"="Scala compiler updates", "filter"=[{"group" = "org.scala-lang"}, {"group" = "org.scoverage"}] }
]
