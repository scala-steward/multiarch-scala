version = 3.11.1

runner.dialect = scala212
runner.dialectOverride.allowSignificantIndentation = false
runner.dialectOverride.allowQuietSyntax = true
maxColumn = 200
style = IntelliJ
align = most
align.openParenCallSite = true
align.tokens."+" = ["=", ":"]
assumeStandardLibraryStripMargin = true
newlines.sometimesBeforeColonInMethodReturnType = false
optIn.breakChainOnFirstMethodDot = false
optIn.configStyleArguments = true
runner.optimizer.forceConfigStyleOnOffset = 120
runner.optimizer.forceConfigStyleMinArgCount = 1
spaces.inImportCurlyBraces = true

rewrite.rules = [
  AsciiSortImports,
  PreferCurlyFors,
  RedundantBraces,
  RedundantParens,
  SortModifiers
]

project.git = true
fileOverride {
  "glob:**/*.sbt" {
    runner.dialect = scala212
    runner.dialectOverride.allowSignificantIndentation = false
    runner.dialectOverride.allowQuietSyntax = true
  }
  "glob:**/project/**/*.scala" {
    runner.dialect = scala212
    runner.dialectOverride.allowSignificantIndentation = false
    runner.dialectOverride.allowQuietSyntax = true
  }
  "glob:**/plugin/src/main/scala-3/**/*.scala" {
    runner.dialect = scala3
  }
  "glob:**/panama-api/**/*.scala" {
    runner.dialect = scala3
  }
  "glob:**/panama-jdk/**/*.scala" {
    runner.dialect = scala3
  }
}
